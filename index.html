<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会议待办智能解析器 | 图片识别待办</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #f0f4fa 0%, #e2e8f0 100%);
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            padding: 2rem 1.5rem;
            min-height: 100vh;
        }
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .hero {
            text-align: center;
            margin-bottom: 2rem;
        }
        .hero h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #1E2A5E, #2C3E6D);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 1.5rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        .card-header {
            padding: 1rem 1.5rem;
            background: #f8fafc;
            border-bottom: 2px solid #e2e8f0;
            font-weight: 600;
            font-size: 1.2rem;
        }
        .paste-zone {
            background: #ffffff;
            border: 2px dashed #cbd5e1;
            border-radius: 1rem;
            margin: 1rem;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .paste-zone:hover {
            border-color: #3b82f6;
            background: #f8fafd;
        }
        .preview-img {
            max-width: 100%;
            max-height: 150px;
            margin: 0 1rem 1rem 1rem;
            border-radius: 0.8rem;
            display: none;
            object-fit: contain;
        }
        textarea {
            width: 100%;
            margin: 1rem;
            width: calc(100% - 2rem);
            padding: 0.8rem;
            border-radius: 1rem;
            border: 1px solid #cbd5e6;
            font-family: monospace;
            resize: vertical;
        }
        .btn {
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            margin: 0 0.5rem 1rem 0.5rem;
        }
        .btn-primary {
            background: #1e3a8a;
            color: white;
        }
        .btn-outline {
            background: white;
            border: 1px solid #cbd5e1;
        }
        .todo-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8fafc;
            margin: 0.5rem 1rem;
            padding: 0.8rem 1rem;
            border-radius: 1rem;
        }
        .todo-task {
            font-weight: 600;
        }
        .todo-meta {
            font-size: 0.7rem;
            color: #5b6e8c;
            margin-top: 4px;
        }
        .delete-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #94a3b8;
        }
        .delete-btn:hover {
            color: #ef4444;
        }
        .empty-todo {
            text-align: center;
            padding: 2rem;
            color: #94a3b8;
        }
        @media (max-width: 800px) {
            .dashboard { grid-template-columns: 1fr; }
        }
        .toast-msg {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.8rem;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="hero">
        <h1>📋 会议待办 · 智能解析器</h1>
        <p>📸 支持图片粘贴 / 截图一键识别 | 自动提取负责人 & 截止日期</p>
    </div>
    <div class="dashboard">
        <div class="card">
            <div class="card-header">📎 导入会议纪要</div>
            <div class="paste-zone" id="pasteZone">
                <div style="font-size: 2rem;">🖼️ 📋</div>
                <p>点击此处 或 按 Ctrl+V 粘贴图片</p>
                <small>支持 PNG / JPG / 截图直接粘贴</small>
            </div>
            <img id="previewImage" class="preview-img" alt="预览">
            <textarea id="rawTextArea" rows="4" placeholder="示例:&#10;笼筐清洗--GJL，7.1完成&#10;外包装袋油污优化--SK 7.3完成"></textarea>
            <div style="padding: 0 1rem 1rem 1rem;">
                <button class="btn btn-outline" id="clearAllBtn">🗑️ 清空待办</button>
                <button class="btn btn-primary" id="parseTextBtn">✨ 智能解析文本</button>
            </div>
        </div>
        <div class="card">
            <div class="card-header">✅ 智能待办清单 <span id="todoCountBadge" style="font-size:0.8rem; margin-left:8px;">0项</span></div>
            <div id="todoListRoot" style="max-height: 500px; overflow-y: auto;">
                <div class="empty-todo">暂无待办，请粘贴图片或输入文本解析 →</div>
            </div>
        </div>
    </div>
</div>
<div id="toastMsg" class="toast-msg"></div>

<script>
    let todoItems = [];
    const todoRoot = document.getElementById('todoListRoot');
    const rawTextArea = document.getElementById('rawTextArea');
    const parseTextBtn = document.getElementById('parseTextBtn');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const pasteZone = document.getElementById('pasteZone');
    const previewImg = document.getElementById('previewImage');
    const todoCountBadge = document.getElementById('todoCountBadge');
    const toastMsgDiv = document.getElementById('toastMsg');

    function showToast(msg, duration=2000) {
        toastMsgDiv.innerText = msg;
        toastMsgDiv.style.opacity = '1';
        setTimeout(() => toastMsgDiv.style.opacity = '0', duration);
    }

    function renderTodos() {
        if (todoItems.length === 0) {
            todoRoot.innerHTML = '<div class="empty-todo">✨ 暂无待办，请粘贴图片或输入文本解析 →</div>';
            todoCountBadge.innerText = '0项';
            return;
        }
        todoCountBadge.innerText = todoItems.length + '项';
        let html = '';
        todoItems.forEach(item => {
            html += `
                <div class="todo-item" data-id="${item.id}">
                    <div>
                        <div class="todo-task">📌 ${escapeHtml(item.task)}</div>
                        <div class="todo-meta">
                            ${item.owner ? `<span>👤 ${item.owner}</span>` : ''}
                            ${item.deadline ? `<span>📅 ${item.deadline}</span>` : ''}
                        </div>
                    </div>
                    <button class="delete-btn" onclick="deleteTodo(${item.id})">🗑️</button>
                </div>
            `;
        });
        todoRoot.innerHTML = html;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    window.deleteTodo = function(id) {
        todoItems = todoItems.filter(t => t.id !== id);
        renderTodos();
        saveToLocal();
        showToast('已删除待办', 1000);
    }

    function parseMeetingNotes(text) {
        if (!text) return [];
        const lines = text.split(/\r?\n/);
        const results = [];
        for (let line of lines) {
            line = line.trim();
            if (line.length === 0) continue;
            let task = '', owner = '', deadline = '';
            let match = line.match(/^(.+?)[\-\–\—]{1,3}\s*([A-Za-z0-9\u4e00-\u9fa5]+)[\s,，]*([\d\.\/月日]+)?(?:完成|截止)?/i);
            if (match) {
                task = match[1].trim();
                owner = match[2].trim();
                if (match[3]) deadline = normalizeDate(match[3].trim());
                if (task && owner) results.push({task, owner, deadline});
                continue;
            }
            let atMatch = line.match(/^(.+?)\s*[@＠]\s*([A-Za-z0-9\u4e00-\u9fa5]+)[\s,，]*([\d\.\/月日]+)?/i);
            if (atMatch) {
                task = atMatch[1].trim();
                owner = atMatch[2].trim();
                if (atMatch[3]) deadline = normalizeDate(atMatch[3].trim());
                if (task && owner) results.push({task, owner, deadline});
                continue;
            }
            if (line.length > 0) {
                results.push({task: line.substring(0, 60), owner: '', deadline: ''});
            }
        }
        return results;
    }

    function normalizeDate(str) {
        let match = str.match(/(\d{1,2})[\.\/](\d{1,2})/);
        if (match) return `${match[1]}月${match[2]}日`;
        match = str.match(/(\d{1,2})月(\d{1,2})日/);
        if (match) return `${match[1]}月${match[2]}日`;
        return str;
    }

    function addTodos(parsed) {
        if (!parsed.length) { showToast('未识别到待办事项', 1500); return false; }
        let added = 0;
        for (let p of parsed) {
            if (!p.task) continue;
            todoItems.push({
                id: Date.now() + Math.random() * 10000 + added,
                task: p.task.substring(0, 80),
                owner: p.owner || '',
                deadline: p.deadline || ''
            });
            added++;
        }
        renderTodos();
        saveToLocal();
        showToast(`✅ 添加 ${added} 项待办`);
        return true;
    }

    function saveToLocal() {
        localStorage.setItem('meeting_todos', JSON.stringify(todoItems.map(({id,task,owner,deadline}) => ({id,task,owner,deadline}))));
    }

    function loadFromLocal() {
        let stored = localStorage.getItem('meeting_todos');
        if (stored) {
            try { todoItems = JSON.parse(stored); renderTodos(); } catch(e) {}
        }
    }

    parseTextBtn.onclick = () => {
        let text = rawTextArea.value;
        if (!text.trim()) { showToast('请输入会议纪要文本', 1200); return; }
        let parsed = parseMeetingNotes(text);
        addTodos(parsed);
    };

    clearAllBtn.onclick = () => {
        if (todoItems.length && confirm('清空所有待办？')) { todoItems = []; renderTodos(); saveToLocal(); showToast('已清空'); }
        else if (!todoItems.length) showToast('暂无待办');
    };

    // 图片粘贴OCR
    function loadTesseract() {
        return new Promise((resolve) => {
            if (window.Tesseract) { resolve(window.Tesseract); return; }
            let script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
            script.onload = () => resolve(window.Tesseract);
            document.head.appendChild(script);
        });
    }

    async function handleImage(blob) {
        let url = URL.createObjectURL(blob);
        previewImg.src = url;
        previewImg.style.display = 'block';
        showToast('🔍 识别图片中...', 2000);
        try {
            const Tesseract = await loadTesseract();
            const worker = await Tesseract.createWorker('chi_sim+eng');
            const ret = await worker.recognize(blob);
            await worker.terminate();
            let text = ret.data.text;
            if (text.trim()) {
                rawTextArea.value = text;
                let parsed = parseMeetingNotes(text);
                if (parsed.length) addTodos(parsed);
                else showToast('图片未识别出待办格式，文本已填入文本框', 2500);
            } else {
                showToast('未识别出文字', 1500);
            }
        } catch(e) {
            showToast('识别失败，可手动输入', 1500);
        }
    }

    window.addEventListener('paste', (e) => {
        let items = e.clipboardData?.items;
        for (let item of items) {
            if (item.type.indexOf('image') !== -1) {
                let blob = item.getAsFile();
                if (blob) { handleImage(blob); e.preventDefault(); return; }
            }
        }
    });

    pasteZone.onclick = () => {
        let input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => {
            if (e.target.files[0]) handleImage(e.target.files[0]);
        };
        input.click();
    };

    loadFromLocal();
    if (todoItems.length === 0) {
        let demo = parseMeetingNotes("笼筐清洗--GJL，7.1完成\n外包装袋油污优化--SK 7.3完成");
        if (demo.length) addTodos(demo);
    }
</script>
</body>
</html>
